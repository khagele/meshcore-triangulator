# meshcore_mqtt_triangulator configuration
# Copy this file to config.ini and fill in your broker details:
#   cp config.example.ini config.ini
# config.ini is gitignored so your credentials stay local.

[mqtt]
# Broker that aggregates MeshCore packet observations.
host = your-broker.example.com
port = 1883

# transport: tcp | websockets
transport = tcp
# For websockets-over-TLS brokers, set transport = websockets and use_tls = true.
websocket_path = /mqtt

# TLS
use_tls = false
tls_verify = true

# Auth (leave blank for anonymous brokers)
username =
password =

# Optional fixed client id (blank = random "mc-tri-xxxxxxxx" each run)
client_id =

# Topic patterns the collector subscribes to (defaults match most setups)
status_topic_pattern  = meshcore/+/+/status
packets_topic_pattern = meshcore/+/+/packets

[storage]
# SQLite database the collector writes to and the locator reads from.
db_path = ./meshcore_data.db

[locator]
# Reject RF chains longer than this (km). 35 is the sweet spot; try 25 or 50.
max_rf_km = 35
# Only use observations within this many days when triangulating.
days_lookback = 14
# Skip targets seen by fewer than this many distinct receivers.
min_observers = 2

[terrain]
# Leave dem_dir blank to disable terrain mode. To enable:
#   1. pip install rasterio
#   2. ./download_dem.py --auto
#   3. set dem_dir = ./dem
dem_dir =
default_antenna_m = 5.0
# LoRa band in your region: EU = 869, US = 915
freq_mhz = 869.0
